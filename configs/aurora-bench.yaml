# Aurora benchmark-optimized config
# Disable everything that Bifrost does not do to ensure fair comparison.
server:
  pprof_enabled: true
  disable_request_body_snapshot: true

passthrough:
  disable_semantic_enrichment: true

# All other settings are now code defaults and match bench-optimized values:
#   h2c always-on, HTTP_MAX_IDLE_CONNS=4096, HTTP_MAX_IDLE_CONNS_PER_HOST=4096,
#   HTTP_MAX_CONNS_PER_HOST=256, PROMPT_CACHE_MODE=off, DISABLE_REQUEST_LOGGING=true,
#   admin/logging/usage/metrics/guardrails/cache/token_saver all disabled by default

# Use same mock upstream as Bifrost
# OPENAI_BASE_URL must still be set via env
