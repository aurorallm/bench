# LiteLLM benchmark proxy config
# Points to the mock server on port 9099
model_list:
  - model_name: "gpt-4o-mini"
    litellm_params:
      model: "openai/gpt-4o-mini"
      api_key: "sk-bench-test-key"
      api_base: "http://localhost:9099/v1"

general_settings:
  master_key: null
  disable_spend_logs: true
  disable_error_logs: true

litellm_settings:
  num_retries: 0
  request_timeout: 60
  drop_params: true
